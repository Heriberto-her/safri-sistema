<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFRI PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
header{background:#020617;padding:15px;text-align:center}
.container{padding:20px;max-width:900px;margin:auto}
.card{background:#1e293b;padding:20px;border-radius:10px;margin-bottom:20px}
input,select,textarea{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none}
button{background:#22c55e;border:none;padding:10px;color:white;border-radius:8px;margin-top:10px}
</style>
</head>

<body>

<header>SAFRI 🔥</header>

<div class="container" id="login">
<div class="card">
<h2>Login</h2>
<select id="tipo">
<option value="admin">Socio</option>
<option value="vendedor">Vendedor</option>
</select>
<input id="usuario" placeholder="Usuario">
<button onclick="login()">Entrar</button>
</div>
</div>

<div class="container" id="app" style="display:none">
<div class="card">
<h2>Escanear</h2>
<input type="file" id="img">
<select id="vendedor"></select>
<select id="precio">
<option value="10">$10</option>
<option value="25">$25</option>
</select>
<button onclick="scan()">Escanear</button>
<textarea id="pins"></textarea>
<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<h2>Stats</h2>
<pre id="stats"></pre>
</div>
</div>

<script type="module">

// 🔥 IMPORTS FIREBASE NUEVO
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 TU CONFIG AQUÍ
const firebaseConfig = {
  apiKey: "AQUI_TU_API",
  authDomain: "AQUI",
  projectId: "AQUI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// DATOS
let vendedores = ["juan","pedro"];
let usuarioActual = "";
let tipoActual = "";

// LOGIN
window.login = function(){
  usuarioActual = document.getElementById('usuario').value;
  tipoActual = document.getElementById('tipo').value;

  document.getElementById('login').style.display="none";
  document.getElementById('app').style.display="block";

  cargarVendedores();
  cargarStats();
}

// CARGAR VENDEDORES
function cargarVendedores(){
  let sel = document.getElementById('vendedor');
  sel.innerHTML="";
  vendedores.forEach(v=>{
    let op = document.createElement('option');
    op.value=v;
    op.text=v;
    sel.appendChild(op);
  });
}

// ESCANEAR
window.scan = function(){
  let file = document.getElementById('img').files[0];
  if(!file) return alert("Sube imagen");

  Tesseract.recognize(file,'eng').then(({data:{text}})=>{
    document.getElementById('pins').value=text;
  });
}

// GUARDAR EN FIREBASE
window.guardar = async function(){
  let pins = document.getElementById('pins').value.split('\\n');
  let vend = document.getElementById('vendedor').value;
  let precio = parseInt(document.getElementById('precio').value);

  for(let p of pins){
    p = p.trim();
    if(p !== ""){
      await addDoc(collection(db, "ventas"), {
        pin:p,
        vendedor:vend,
        precio:precio,
        fecha:new Date()
      });
    }
  }

  alert("Guardado en la nube 🔥");
  cargarStats();
}

// STATS DESDE FIREBASE
async function cargarStats(){

  const querySnapshot = await getDocs(collection(db, "ventas"));

  let total=0;
  let txt="";

  querySnapshot.forEach(doc=>{
    let v = doc.data();
    if(tipoActual=="admin"){
      total += v.precio;
    }
    if(tipoActual=="vendedor" && v.vendedor==usuarioActual){
      total += v.precio;
    }
  });

  txt = "Total: $" + total + "\\n15%: $" + (total*0.15);

  document.getElementById('stats').textContent = txt;
}

</script>

</body>
</html>
