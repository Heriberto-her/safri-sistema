<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFRI SISTEMA PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
header{background:#020617;padding:15px;text-align:center;font-size:20px}
.menu{background:#020617;padding:10px;text-align:center}
.menu button{margin:5px;padding:10px;border:none;border-radius:8px;background:#22c55e;color:white}
.container{padding:20px;max-width:900px;margin:auto}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
input,select,textarea{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none}
button{background:#22c55e;border:none;padding:10px;color:white;border-radius:8px;margin-top:10px}
</style>
</head>

<body>

<header>SAFRI 🔥</header>

<!-- LOGIN -->
<div class="container" id="login">
<div class="card">
<h2>Login</h2>
<select id="tipo">
<option value="admin">Socio</option>
<option value="vendedor">Vendedor</option>
</select>
<input id="usuario" placeholder="Nombre">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- MENU -->
<div id="menu" class="menu" style="display:none">
<button onclick="ver('dashboard')">🏠 Inicio</button>
<button onclick="ver('scan')">📸 Escanear</button>
<button onclick="ver('stats')">📊 Stats</button>
<button onclick="ver('vendedores')" id="btnVendedores">👥 Vendedores</button>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard" style="display:none">
<div class="card">
<h2>Bienvenido</h2>
<p>Sistema SAFRI funcionando 🔥</p>
</div>
</div>

<!-- ESCANEAR -->
<div class="container" id="scan" style="display:none">
<div class="card">
<h2>Escanear fichas</h2>

<input type="file" id="img">

<select id="vendedor"></select>

<select id="precio">
<option value="10">$10</option>
<option value="25">$25</option>
</select>

<button onclick="scan()">Escanear</button>

<textarea id="pins"></textarea>

<button onclick="guardar()">Registrar</button>
</div>
</div>

<!-- STATS -->
<div class="container" id="stats" style="display:none">
<div class="card">
<h2>Estadísticas</h2>
<pre id="statsContent"></pre>
</div>
</div>

<!-- VENDEDORES -->
<div class="container" id="vendedores" style="display:none">
<div class="card">
<h2>Vendedores</h2>
<input id="nuevoVend" placeholder="Nombre">
<button onclick="agregarVend()">Agregar</button>
<ul id="listaVend"></ul>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 PEGA TU CONFIG AQUÍ
const firebaseConfig = {
  apiKey: "AQUI",
  authDomain: "AQUI",
  projectId: "AQUI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let vendedores = JSON.parse(localStorage.getItem('vendedores')) || ["juan","pedro"];
let usuarioActual="";
let tipoActual="";

// LOGIN
window.login = function(){
usuarioActual = document.getElementById('usuario').value.toLowerCase();
tipoActual = document.getElementById('tipo').value;

document.getElementById('login').style.display="none";
document.getElementById('menu').style.display="block";

if(tipoActual==="vendedor"){
 document.getElementById('btnVendedores').style.display="none";
}

cargarVendedores();
mostrarVend();
ver('dashboard');
}

// CAMBIAR VISTA
window.ver = function(v){
["dashboard","scan","stats","vendedores"].forEach(id=>{
 document.getElementById(id).style.display="none";
});
document.getElementById(v).style.display="block";

if(v==="stats") cargarStats();
}

// VENDEDORES
function cargarVendedores(){
let sel=document.getElementById('vendedor');
sel.innerHTML="";
vendedores.forEach(v=>{
 let op=document.createElement('option');
 op.value=v;
 op.text=v;
 sel.appendChild(op);
});
}

window.agregarVend = function(){
let v=document.getElementById('nuevoVend').value;
if(v){
 vendedores.push(v);
 localStorage.setItem('vendedores',JSON.stringify(vendedores));
 mostrarVend();
}
}

function mostrarVend(){
let lista=document.getElementById('listaVend');
lista.innerHTML="";
vendedores.forEach(v=>{
 let li=document.createElement('li');
 li.textContent=v;
 lista.appendChild(li);
});
}

// ESCANEAR
window.scan = function(){
let file=document.getElementById('img').files[0];
if(!file) return alert("Sube imagen");

Tesseract.recognize(file,'eng').then(({data:{text}})=>{
 document.getElementById('pins').value=text;
});
}

// GUARDAR
window.guardar = async function(){
let pins=document.getElementById('pins').value.split('\\n');
let vend=document.getElementById('vendedor').value;
let precio=parseInt(document.getElementById('precio').value);

for(let p of pins){
 p=p.trim();
 if(p!=""){
  await addDoc(collection(db,"ventas"),{
   pin:p,
   vendedor:vend,
   precio:precio,
   fecha:new Date()
  });
 }
}

alert("Guardado 🔥");
}

// STATS
async function cargarStats(){
const querySnapshot = await getDocs(collection(db,"ventas"));

let total=0;
let txt="";

querySnapshot.forEach(doc=>{
 let v=doc.data();

 if(tipoActual==="admin"){
  total+=v.precio;
 }

 if(tipoActual==="vendedor" && v.vendedor===usuarioActual){
  total+=v.precio;
 }
});

txt = "Total: $" + total + "\\n15%: $" + (total*0.15).toFixed(2);

document.getElementById('statsContent').textContent=txt;
}

</script>

</body>
</html>
