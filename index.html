<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFRI PRO 🔥</title>

<!-- FIREBASE V8 (ESTABLE PARA GITHUB) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
header{background:#020617;padding:15px;text-align:center}
.container{padding:20px;max-width:900px;margin:auto}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
input,select,textarea{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none}
button{background:#22c55e;border:none;padding:10px;color:white;border-radius:8px;margin-top:10px}
.menu{background:#020617;padding:10px;text-align:center}
.menu button{margin:5px}
</style>
</head>

<body>

<header>SAFRI 🔥</header>

<!-- LOGIN -->
<div class="container" id="loginBox">
<div class="card">
<h2>Login</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="mostrarRegistro()">Crear cuenta</button>
</div>
</div>

<!-- REGISTRO -->
<div class="container" id="registroBox" style="display:none">
<div class="card">
<h2>Registro</h2>
<input id="nombre" placeholder="Nombre">
<input id="emailR" placeholder="Correo">
<input id="passR" type="password" placeholder="Contraseña">
<select id="tipoUser">
<option value="vendedor">Vendedor</option>
<option value="admin">Socio</option>
</select>
<button onclick="registrar()">Crear cuenta</button>
<button onclick="volverLogin()">Volver</button>
</div>
</div>

<!-- MENU -->
<div id="menu" class="menu" style="display:none">
<button onclick="ver('dashboard')">🏠 Inicio</button>
<button onclick="ver('scan')">📸 Escanear</button>
<button onclick="ver('stats')">📊 Stats</button>
<button onclick="logout()">Salir</button>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard" style="display:none">
<div class="card"><h2>Bienvenido 🔥</h2></div>
</div>

<!-- ESCANEAR -->
<div class="container" id="scan" style="display:none">
<div class="card">
<h2>Escanear</h2>
<input id="pins" placeholder="Pega PINs">
<button onclick="guardar()">Guardar</button>
</div>
</div>

<!-- STATS -->
<div class="container" id="stats" style="display:none">
<div class="card">
<h2>Estadísticas</h2>
<pre id="statsContent"></pre>
</div>
</div>

<script>

// 🔥 CONFIG (TUYA)
const firebaseConfig = {
  apiKey: "AIzaSyBAx5v07KT6gNgK1k04VEPGiJ_hsoIcX2w",
  authDomain: "safriapp-2f1db.firebaseapp.com",
  projectId: "safriapp-2f1db"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let uidActual="";
let tipoActual="";

// LOGIN
window.login = function(){
let email = document.getElementById('email').value;
let pass = document.getElementById('password').value;

auth.signInWithEmailAndPassword(email, pass)
.then(res=>{
  uidActual = res.user.uid;
  cargarDatos(uidActual);
})
.catch(err=>alert(err.message));
}

// REGISTRO
window.registrar = function(){
let nombre = document.getElementById('nombre').value;
let email = document.getElementById('emailR').value;
let pass = document.getElementById('passR').value;
let tipo = document.getElementById('tipoUser').value;

auth.createUserWithEmailAndPassword(email, pass)
.then(res=>{
 db.collection("usuarios").doc(res.user.uid).set({
   nombre:nombre,
   correo:email,
   tipo:tipo
 });
 alert("Cuenta creada 🔥");
 volverLogin();
})
.catch(err=>alert(err.message));
}

// CARGAR USUARIO
function cargarDatos(uid){
db.collection("usuarios").doc(uid).get().then(doc=>{
 let data = doc.data();
 tipoActual = data.tipo;

 document.getElementById('loginBox').style.display="none";
 document.getElementById('menu').style.display="block";

 ver('dashboard');
});
}

// NAVEGACIÓN
window.ver = function(v){
["dashboard","scan","stats"].forEach(id=>{
 document.getElementById(id).style.display="none";
});
document.getElementById(v).style.display="block";

if(v==="stats") cargarStats();
}

// GUARDAR
window.guardar = function(){
let pins = document.getElementById('pins').value;

db.collection("ventas").add({
 pin:pins,
 uid:uidActual,
 fecha:new Date()
});

alert("Guardado 🔥");
}

// STATS
function cargarStats(){
db.collection("ventas").get().then(snap=>{
 document.getElementById('statsContent').textContent =
 "Total ventas: " + snap.size;
});
}

// LOGOUT
window.logout = function(){
auth.signOut();
location.reload();
}

// VISTAS
window.mostrarRegistro = function(){
document.getElementById('loginBox').style.display="none";
document.getElementById('registroBox').style.display="block";
}

window.volverLogin = function(){
document.getElementById('loginBox').style.display="block";
document.getElementById('registroBox').style.display="none";
}

</script>

</body>
</html>
