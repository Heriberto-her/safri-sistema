<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFRI Sistema</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

header{
    background:#020617;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.container{
    padding:20px;
    max-width:1000px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input, textarea, select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:10px;
}

button{
    background:#22c55e;
    border:none;
    padding:10px;
    color:white;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

pre{
    background:#020617;
    padding:10px;
    border-radius:8px;
}

</style>
</head>

<body>

<header>SAFRI SISTEMA 🔥</header>

<!-- LOGIN -->
<div class="container" id="login">
<div class="card">
<h2>🔐 Login</h2>

<select id="tipo">
<option value="admin">Socio</option>
<option value="vendedor">Vendedor</option>
</select>

<input id="usuario" placeholder="Nombre">

<button onclick="entrar()">Entrar</button>
</div>
</div>

<!-- SISTEMA -->
<div class="container" id="sistema" style="display:none">

<div class="card">
<h2>📸 Escanear Fichas</h2>

<input type="file" id="imagen">

<select id="vendedorSelect"></select>

<select id="precio">
<option value="10">$10</option>
<option value="25">$25</option>
</select>

<button onclick="scan()">Escanear</button>

<textarea id="pins"></textarea>

<button onclick="registrar()">Registrar</button>
</div>

<div class="card">
<h2>📊 Estadísticas</h2>
<pre id="stats"></pre>
</div>

</div>

<script>

let vendedores = JSON.parse(localStorage.getItem('vendedores')) || ["juan","pedro"];
let ventas = JSON.parse(localStorage.getItem('ventas')) || [];

let usuarioActual = "";
let tipoActual = "";

// LOGIN
function entrar(){
    usuarioActual = document.getElementById('usuario').value.toLowerCase();
    tipoActual = document.getElementById('tipo').value;

    document.getElementById('login').style.display = 'none';
    document.getElementById('sistema').style.display = 'block';

    cargarVendedores();
    mostrarStats();
}

// CARGAR VENDEDORES
function cargarVendedores(){
    let sel = document.getElementById('vendedorSelect');
    sel.innerHTML = "";

    vendedores.forEach(v=>{
        let op = document.createElement('option');
        op.value = v;
        op.text = v;
        sel.appendChild(op);
    });
}

// ESCANEAR IMAGEN
function scan(){
    let file = document.getElementById('imagen').files[0];

    if(!file){
        alert("Selecciona una imagen");
        return;
    }

    Tesseract.recognize(file,'eng').then(({data:{text}})=>{
        document.getElementById('pins').value = text;
    });
}

// REGISTRAR VENTAS (SIN DUPLICADOS)
function registrar(){

let pins = document.getElementById('pins').value.split('\n');
let vend = document.getElementById('vendedorSelect').value;
let precio = parseInt(document.getElementById('precio').value);

pins.forEach(p=>{
    p = p.trim();

    if(p !== ""){

        let existe = ventas.find(v => v.pin === p);

        if(!existe){
            ventas.push({
                pin: p,
                vendedor: vend,
                precio: precio,
                fecha: new Date().toLocaleString()
            });
        }

    }
});

localStorage.setItem('ventas', JSON.stringify(ventas));

mostrarStats();
alert("Registrado sin duplicados");
}

// ESTADÍSTICAS
function mostrarStats(){

let total10 = 0;
let total25 = 0;
let porVendedor = {};

ventas.forEach(v=>{
    if(v.precio == 10) total10++;
    if(v.precio == 25) total25++;

    if(!porVendedor[v.vendedor]){
        porVendedor[v.vendedor] = { total:0 };
    }

    porVendedor[v.vendedor].total += v.precio;
});

let txt = "";

// SOCIO
if(tipoActual == "admin"){

txt += "Fichas $10: " + total10 + "\n";
txt += "Fichas $25: " + total25 + "\n\n";

for(let v in porVendedor){

    let total = porVendedor[v].total;
    let ganancia = total * 0.15;

    txt += v + ":\n";
    txt += "Total: $" + total + "\n";
    txt += "15%: $" + ganancia.toFixed(2) + "\n\n";
}

}

// VENDEDOR
if(tipoActual == "vendedor"){

let total = 0;
let f10 = 0;
let f25 = 0;

ventas.forEach(v=>{
    if(v.vendedor == usuarioActual){
        total += v.precio;
        if(v.precio == 10) f10++;
        if(v.precio == 25) f25++;
    }
});

let ganancia = total * 0.15;

txt += "Tus fichas $10: " + f10 + "\n";
txt += "Tus fichas $25: " + f25 + "\n\n";
txt += "Total vendido: $" + total + "\n";
txt += "Tu 15%: $" + ganancia.toFixed(2);

}

document.getElementById('stats').textContent = txt;

}

</body>
